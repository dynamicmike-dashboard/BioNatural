name: Security (AgentShield)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run AgentShield
        run: |
          npx @affaan-m/agentshield scan --config mcp-config.json || true
          echo "🔴 AGENTSHIELD WARNING: Vulnerability found but push allowed per SOP."
